<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedução Genuína - Desenvolva Confiança Real | E-book Exclusivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ef4444;
            --primary-hover: #dc2626;
            --bg: #0a0a0a;
            --bg-light: #1a1a1a;
            --bg-lighter: #262626;
            --text: #ffffff;
            --text-secondary: #e5e5e5;
            --text-muted: #a3a3a3;
            --border: #2d2d2d;
            --border-light: #3a3a3a;
            --success: #22c55e;
            --warning: #f59e0b;
            --gray1: #fafafa;
            --gray2: #f5f5f5;
            --gray3: #f0f0f0;
            --gray4: #e5e5e5;
            --gray5: #d4d4d4;
            --gray6: #a3a3a3;
            --gray7: #737373;
            --gray8: #525252;
            --gray9: #404040;
            --gray10: #262626;
            --gray11: #171717;
            --gray12: #0a0a0a;
        }

        html[data-theme="dark"] {
            color-scheme: dark;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ THEME TOGGLE ============ */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bg-light);
            border: 1px solid var(--border);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-lighter);
            border-color: var(--primary);
        }

        /* ============ HEADER ============ */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            gap: 32px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        nav a:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            nav {
                display: none;
            }
        }

        /* ============ HERO SECTION ============ */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 120px 20px 60px;
            margin-top: 60px;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(239, 68, 68, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(10, 10, 10, 0.5) 100%);
            z-index: 1;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-text {
            padding: 20px;
        }

        .hero-text .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 32px;
            width: fit-content;
            animation: slideInDown 0.6s ease-out;
        }

        .hero-text h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(44px, 8vw, 76px);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: -1px;
            animation: slideInUp 0.8s ease-out 0.1s both;
        }

        .hero-text h1 .highlight {
            color: var(--primary);
            display: inline-block;
            position: relative;
        }

        .hero-text h1 .highlight::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), transparent);
            border-radius: 2px;
        }

        .hero-text .subtitle {
            font-size: 18px;
            color: var(--text);
            font-weight: 500;
            margin-bottom: 16px;
            line-height: 1.8;
            animation: slideInUp 0.8s ease-out 0.2s both;
        }

        .hero-text .subtitle strong {
            color: var(--text);
            font-weight: 700;
        }

        .hero-text .subtitle .highlight-primary {
            color: var(--primary);
            font-weight: 700;
        }

        .hero-text .description {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.8;
            animation: slideInUp 0.8s ease-out 0.3s both;
        }

        .countdown {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            align-items: center;
            animation: slideInUp 0.8s ease-out 0.4s both;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            min-width: 65px;
        }

        .countdown-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .countdown-separator {
            font-size: 28px;
            color: var(--primary);
            font-weight: 700;
            align-self: flex-start;
            margin-top: 2px;
        }

        .cta-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: slideInUp 0.8s ease-out 0.5s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.5);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ============ HERO IMAGE ============ */
        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: slideInRight 0.8s ease-out 0.3s both;
        }

        .hero-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            border-radius: 16px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(59, 130, 246, 0.1));
            border: 1px solid var(--border-light);
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.2);
        }

        .hero-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-image-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(10, 10, 10, 0.3) 100%);
            z-index: 1;
        }

        /* ============ FEATURES SECTION ============ */
        .features {
            padding: 100px 20px;
            background: var(--bg);
            position: relative;
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(36px, 6vw, 56px);
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .section-header p {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
        }

        .feature-card {
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-lighter) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            scroll-margin-top: 100px;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), transparent);
            transition: left 0.3s ease;
            z-index: 1;
        }

        .feature-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(239, 68, 68, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .feature-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.15);
            transform: translateY(-8px);
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.05) 0%, var(--bg-lighter) 100%);
        }

        .feature-card:hover::before {
            left: 0;
        }

        .feature-card:hover::after {
            opacity: 1;
        }

        .feature-content {
            position: relative;
            z-index: 2;
        }

        .feature-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            font-variant-numeric: tabular-nums;
        }

        .feature-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .feature-card h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .feature-card p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ============ SOCIAL PROOF SECTION ============ */
        .social-proof {
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.05) 0%, transparent 100%);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .proof-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .proof-item h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 40px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .proof-item p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ============ TESTIMONIALS SECTION ============ */
        .testimonials {
            padding: 100px 20px;
            background: var(--bg);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }

        .testimonial-card {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            transition: all 0.3s ease;
        }

        .testimonial-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.15);
        }

        .testimonial-rating {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
